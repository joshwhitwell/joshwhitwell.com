<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Laravel PWA</title>
    <style>
        body {
            font-family: 'Instrument Sans', system-ui, sans-serif;
            line-height: 1.5;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: white;
            color: #333;
        }
        .container {
            padding: 2rem;
            max-width: 500px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        p {
            margin-bottom: 1.5rem;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #111;
                color: #f5f5f5;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📶</div>
        <h1>You're Offline</h1>
        <p>It looks like you're not connected to the internet right now. Please check your connection and try again.</p>
        <p>Some features of this app are available offline if you've visited them before.</p>
    </div>
</body>
</html>
